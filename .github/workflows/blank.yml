name: my_first_ci

on:
  pull_request:
  push:
    branches: [main]

jobs:
  ci_jobs:
    runs-on: ubuntu-latest

    defaults:
      run:
        working-directory: server

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Setup Node environment
        uses: actions/setup-node@v4
        with:
          node-version: 18

      - name: Install Dependencies
        run: npm install

      - name: Run Index File
        run: node index.js
    
    

